<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN ACCESS — ARYAN CORE</title>
    <link rel="stylesheet" href="/admin-base.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-container {
            max-width: 500px;
            width: 90%;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border-chrome);
            padding: 3rem;
            position: relative;
        }
        .login-box::before,
        .login-box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-cyan);
        }
        .login-box::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .login-box::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        .login-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--accent-copper);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        .login-subtitle {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-chrome);
            padding: 15px;
            font-family: var(--font-mono);
            color: #fff;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-copper);
            background: rgba(255, 110, 39, 0.05);
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            padding-right: 50px;
        }
        .eye-icon {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .eye-icon:hover {
            color: var(--accent-cyan);
        }
        .eye-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .error-msg {
            font-family: var(--font-mono);
            color: var(--accent-red);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
        .error-msg.active { display: block; }
    </style>
</head>
<body>
    <div class="global-grid"></div>
    
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">ADMIN_ACCESS</h1>
            <p class="login-subtitle">// SECURE AUTHENTICATION REQUIRED</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>SYS.EMAIL:</label>
                    <input type="email" id="email" placeholder="Enter admin email" required>
                </div>
                <div class="form-group">
                    <label>SYS.PASSWORD:</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter admin password" required>
                        <span class="eye-icon" id="togglePassword">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path id="eyeOpen" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle id="eyeCircle" cx="12" cy="12" r="3"></circle>
                                <line id="eyeSlash" x1="1" y1="1" x2="23" y2="23" style="display:none;"></line>
                            </svg>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    AUTHENTICATE
                </button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <script src="/config.js"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (token) {
            window.location.href = '/admin/dashboard.html';
        }

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeSlash = document.getElementById('eyeSlash');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            eyeSlash.style.display = type === 'text' ? 'block' : 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('active');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            console.log('Attempting login with:', email);

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorMsg.textContent = '✗ ' + (data.error || 'Authentication failed');
                    errorMsg.classList.add('active');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = '✗ Connection error: ' + error.message;
                errorMsg.classList.add('active');
            }
        });
    </script>
</body>
</html>
