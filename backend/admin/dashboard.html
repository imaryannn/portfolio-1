<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN DASHBOARD — ARYAN CORE</title>
    <link rel="stylesheet" href="./admin-base.css">
    <link rel="stylesheet" href="./admin-style.css">
    <script src="./config.js"></script>

</head>
<body>
    <div class="global-grid"></div>
    
    <nav id="admin-nav">
        <a href="/admin/dashboard" class="nav-logo">ADMIN<span>_CORE</span></a>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link active">Dashboard</a>
            <a href="/admin/projects" class="nav-link">Projects</a>
            <a href="/admin/skills" class="nav-link">Skills</a>
            <a href="/admin/profile" class="nav-link">Profile</a>
            <a href="/" class="nav-link">View Site</a>
            <button id="logoutBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <main class="admin-main">
        <div class="container">
            <div class="section-label">System.Overview</div>
            <h1 class="section-heading">Control Panel</h1>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-copper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </div>
                    <div class="stat-value" id="projectCount">0</div>
                    <div class="stat-label">Projects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="stat-value" id="skillCount">0</div>
                    <div class="stat-label">Skills</div>
                </div>
                <div class="stat-card" style="cursor: pointer;" id="statusCard">
                    <div class="stat-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="statusIcon">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M8 12l2 2 4-4"></path>
                        </svg>
                    </div>
                    <div class="stat-value" id="statusValue">ONLINE</div>
                    <div class="stat-label">Status (Click to toggle)</div>
                </div>
            </div>

            <div class="quick-actions">
                <h2 style="font-family: var(--font-mono); color: var(--accent-cyan); margin-bottom: 1.5rem;">QUICK_ACTIONS</h2>
                <div class="action-grid">
                    <a href="/admin/projects" class="action-card">
                        <span class="action-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-copper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="12" y1="18" x2="12" y2="12"></line>
                                <line x1="9" y1="15" x2="15" y2="15"></line>
                            </svg>
                        </span>
                        <span>Add Project</span>
                    </a>
                    <a href="/admin/skills" class="action-card">
                        <span class="action-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </span>
                        <span>Edit Skills</span>
                    </a>
                    <a href="/admin/profile" class="action-card">
                        <span class="action-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <span>Update Profile</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
    <script>
        let currentStatus = true;
        
        async function loadStats() {
            try {
                const [projectsRes, skillsRes, statusRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/api/projects`),
                    fetch(`${API_BASE_URL}/api/skills`),
                    fetch(`${API_BASE_URL}/api/status`)
                ]);

                const projectsData = await projectsRes.json();
                const skillsData = await skillsRes.json();
                const statusData = await statusRes.json();

                document.getElementById('projectCount').textContent = projectsData.projects?.length || 0;
                document.getElementById('skillCount').textContent = skillsData.skills?.length || 0;
                
                currentStatus = statusData.online !== false;
                updateStatusDisplay();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        function updateStatusDisplay() {
            const statusValue = document.getElementById('statusValue');
            const statusCard = document.getElementById('statusCard');
            const statusIcon = document.getElementById('statusIcon');
            
            if (currentStatus) {
                statusValue.textContent = 'ONLINE';
                statusValue.style.color = '#27c93f';
                statusCard.style.borderColor = '#27c93f';
                statusIcon.style.stroke = '#27c93f';
                statusIcon.innerHTML = '<circle cx="12" cy="12" r="10"></circle><path d="M8 12l2 2 4-4"></path>';
            } else {
                statusValue.textContent = 'OFFLINE';
                statusValue.style.color = 'var(--accent-red)';
                statusCard.style.borderColor = 'var(--accent-red)';
                statusIcon.style.stroke = 'var(--accent-red)';
                statusIcon.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>';
            }
        }
        
        document.getElementById('statusCard').addEventListener('click', async () => {
            currentStatus = !currentStatus;
            updateStatusDisplay();
            
            try {
                const token = localStorage.getItem('adminToken');
                await fetch(`${API_BASE_URL}/api/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ online: currentStatus })
                });
            } catch (error) {
                console.error('Error updating status:', error);
            }
        });

        loadStats();
    </script>
</body>
</html>
